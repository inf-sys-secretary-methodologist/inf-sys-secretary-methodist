# compose.deploy.yml
# Deployment configuration for staging/production environments
# Usage: docker compose -f compose.deploy.yml up -d

services:
  postgres:
    image: postgres:17-alpine
    container_name: inf-sys-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inf_sys_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-inf_sys_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inf-sys-network

  # Database migrations (runs once before backend starts)
  migrations:
    image: migrate/migrate:latest
    container_name: inf-sys-migrations
    volumes:
      - ./migrations:/migrations:ro
    command: [
      "-path=/migrations",
      "-database=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-inf_sys_db}?sslmode=${DB_SSL_MODE:-disable}",
      "up"
    ]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - inf-sys-network
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: inf-sys-redis
    restart: unless-stopped
    command: >
      sh -c '
        if [ -n "$$REDIS_PASSWORD" ]; then
          redis-server --requirepass "$$REDIS_PASSWORD" --appendonly yes
        else
          redis-server --appendonly yes
        fi
      '
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - |
          if [ -n "$$REDIS_PASSWORD" ]; then
            redis-cli -a "$$REDIS_PASSWORD" ping
          else
            redis-cli ping
          fi
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inf-sys-network

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/inf-sys-secretary-methodologist/inf-sys-secretary-methodist/backend}:${BACKEND_TAG:-latest}
    container_name: inf-sys-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    labels:
      - "logging=promtail"
      - "service=backend"
    environment:
      # Server
      SERVER_PORT: 8080
      SERVER_READ_TIMEOUT: ${SERVER_READ_TIMEOUT:-10s}
      SERVER_WRITE_TIMEOUT: ${SERVER_WRITE_TIMEOUT:-10s}
      SERVER_IDLE_TIMEOUT: ${SERVER_IDLE_TIMEOUT:-120s}

      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DB_NAME: ${POSTGRES_DB:-inf_sys_db}
      DB_SSL_MODE: ${DB_SSL_MODE:-disable}
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-25}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-5}
      DB_CONN_MAX_LIFETIME: ${DB_CONN_MAX_LIFETIME:-5m}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_POOL_SIZE: ${REDIS_POOL_SIZE:-10}

      # Authentication
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-168h}

      # Composio Configuration
      COMPOSIO_API_KEY: ${COMPOSIO_API_KEY:-}
      COMPOSIO_ENTITY_ID: ${COMPOSIO_ENTITY_ID:-}
      COMPOSIO_MCP_CONFIG_ID: ${COMPOSIO_MCP_CONFIG_ID:-}

      # CORS Configuration
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      CORS_ALLOWED_METHODS: ${CORS_ALLOWED_METHODS:-GET,POST,PUT,DELETE,OPTIONS}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS:-Content-Type,Authorization}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}

      # Application
      ENVIRONMENT: ${ENVIRONMENT:-production}
      VERSION: ${VERSION:-0.1.0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - inf-sys-network

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/inf-sys-secretary-methodologist/inf-sys-secretary-methodist/frontend}:${FRONTEND_TAG:-latest}
    container_name: inf-sys-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8080}
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - inf-sys-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  inf-sys-network:
    driver: bridge
