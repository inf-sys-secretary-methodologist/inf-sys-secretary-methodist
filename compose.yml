# compose.yml

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: postgres-dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inf_sys_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Please set POSTGRES_PASSWORD in compose.override.yml}
    # Порты НЕ пробрасываются по умолчанию для безопасности
    # Раскомментируйте в compose.override.yml если нужен доступ с хоста
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-inf_sys_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis-dev
    command: >
      sh -c '
        if [ -n "$$REDIS_PASSWORD" ]; then
          redis-server --requirepass "$$REDIS_PASSWORD"
        else
          redis-server
        fi
      '
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    # Порты НЕ пробрасываются по умолчанию для безопасности
    # Раскомментируйте в compose.override.yml если нужен доступ с хоста
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - |
          if [ -n "$$REDIS_PASSWORD" ]; then
            redis-cli -a "$$REDIS_PASSWORD" ping
          else
            redis-cli ping
          fi
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio-dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-dev
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8080}:8080"
    labels:
      - "logging=promtail"
      - "service=backend"
    environment:
      # Server
      SERVER_PORT: 8080
      SERVER_READ_TIMEOUT: ${SERVER_READ_TIMEOUT:-10s}
      SERVER_WRITE_TIMEOUT: ${SERVER_WRITE_TIMEOUT:-10s}
      SERVER_IDLE_TIMEOUT: ${SERVER_IDLE_TIMEOUT:-120s}

      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Please set POSTGRES_PASSWORD in compose.override.yml}
      DB_NAME: ${POSTGRES_DB:-inf_sys_db}
      DB_SSL_MODE: ${DB_SSL_MODE:-disable}
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-25}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-5}
      DB_CONN_MAX_LIFETIME: ${DB_CONN_MAX_LIFETIME:-5m}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_POOL_SIZE: ${REDIS_POOL_SIZE:-10}

      # Authentication (REQUIRED in production!)
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?Please set JWT_ACCESS_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Please set JWT_REFRESH_SECRET in .env}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-168h}

      # Composio Configuration (for Gmail and Telegram integration)
      COMPOSIO_API_KEY: ${COMPOSIO_API_KEY:-}
      COMPOSIO_ENTITY_ID: ${COMPOSIO_ENTITY_ID:-}
      COMPOSIO_MCP_CONFIG_ID: ${COMPOSIO_MCP_CONFIG_ID:-}

      # Telegram Bot Configuration
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}

      # Web Push (VAPID) Configuration
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}

      # CORS Configuration
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      CORS_ALLOWED_METHODS: ${CORS_ALLOWED_METHODS:-GET,POST,PUT,DELETE,OPTIONS}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS:-Content-Type,Authorization}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}

      # S3/MinIO Storage
      S3_ENDPOINT: minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-localhost:9000}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-documents}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      S3_PUBLIC_USE_SSL: ${S3_PUBLIC_USE_SSL:-false}
      S3_MAX_FILE_SIZE: ${S3_MAX_FILE_SIZE:-104857600}

      # Application
      ENVIRONMENT: ${ENVIRONMENT:-development}
      VERSION: ${VERSION:-0.2.0}

      # Sentry Error Tracking
      SENTRY_DSN: ${SENTRY_DSN:-}

      # AI/RAG Configuration
      AI_ENABLED: ${AI_ENABLED:-false}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      AI_CHAT_API_KEY: ${AI_CHAT_API_KEY:-}
      AI_CHAT_BASE_URL: ${AI_CHAT_BASE_URL:-}
      AI_EMBEDDING_PROVIDER: ${AI_EMBEDDING_PROVIDER:-openai}
      AI_EMBEDDING_API_KEY: ${AI_EMBEDDING_API_KEY:-}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-gemini-embedding-001}
      AI_EMBEDDING_DIMENSIONALITY: ${AI_EMBEDDING_DIMENSIONALITY:-3072}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-gemini-2.5-flash}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-2048}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.3}
      AI_CHUNK_SIZE: ${AI_CHUNK_SIZE:-512}
      AI_CHUNK_OVERLAP: ${AI_CHUNK_OVERLAP:-102}
      AI_SEARCH_TOP_K: ${AI_SEARCH_TOP_K:-10}
      AI_SEARCH_THRESHOLD: ${AI_SEARCH_THRESHOLD:-0.7}
      AI_TIMEOUT: ${AI_TIMEOUT:-60s}
      AI_FALLBACK_PROVIDER: ${AI_FALLBACK_PROVIDER:-}
      AI_FALLBACK_API_KEY: ${AI_FALLBACK_API_KEY:-}
      AI_FALLBACK_BASE_URL: ${AI_FALLBACK_BASE_URL:-}
      AI_FALLBACK_CHAT_MODEL: ${AI_FALLBACK_CHAT_MODEL:-}
      AI_FALLBACK_EMBEDDING_PROVIDER: ${AI_FALLBACK_EMBEDDING_PROVIDER:-}
      AI_FALLBACK_EMBEDDING_API_KEY: ${AI_FALLBACK_EMBEDDING_API_KEY:-}
      AI_FALLBACK_EMBEDDING_BASE_URL: ${AI_FALLBACK_EMBEDDING_BASE_URL:-}
      AI_FALLBACK_EMBEDDING_MODEL: ${AI_FALLBACK_EMBEDDING_MODEL:-}
      AI_FALLBACK_EMBEDDING_DIMENSIONALITY: ${AI_FALLBACK_EMBEDDING_DIMENSIONALITY:-0}

      # 1C Integration Configuration
      INTEGRATION_1C_ENABLED: ${INTEGRATION_1C_ENABLED:-false}
      INTEGRATION_1C_BASE_URL: ${INTEGRATION_1C_BASE_URL:-}
      INTEGRATION_1C_USERNAME: ${INTEGRATION_1C_USERNAME:-}
      INTEGRATION_1C_PASSWORD: ${INTEGRATION_1C_PASSWORD:-}
      INTEGRATION_1C_TIMEOUT: ${INTEGRATION_1C_TIMEOUT:-30s}
      INTEGRATION_1C_MAX_RETRIES: ${INTEGRATION_1C_MAX_RETRIES:-3}
      INTEGRATION_1C_RETRY_DELAY: ${INTEGRATION_1C_RETRY_DELAY:-5s}
      INTEGRATION_1C_EMPLOYEE_CATALOG: ${INTEGRATION_1C_EMPLOYEE_CATALOG:-Catalog_Сотрудники}
      INTEGRATION_1C_STUDENT_CATALOG: ${INTEGRATION_1C_STUDENT_CATALOG:-Catalog_Студенты}
      INTEGRATION_1C_SYNC_CRON_EMPLOYEE: ${INTEGRATION_1C_SYNC_CRON_EMPLOYEE:-0 */6 * * *}
      INTEGRATION_1C_SYNC_CRON_STUDENT: ${INTEGRATION_1C_SYNC_CRON_STUDENT:-0 */6 * * *}
      INTEGRATION_1C_BATCH_SIZE: ${INTEGRATION_1C_BATCH_SIZE:-100}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    container_name: frontend-dev
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    depends_on:
      - backend
    # Для Linux раскомментируйте в compose.override.yml:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    container_name: backup-service
    environment:
      # Backup mode: cron, backup, restore-postgres, restore-minio, shell
      BACKUP_MODE: ${BACKUP_MODE:-cron}
      # Cron schedule (default: 2:00 AM daily)
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 2 * * *}
      # Run backup on container start
      BACKUP_ON_START: ${BACKUP_ON_START:-false}
      # Retention period in days
      POSTGRES_BACKUP_RETENTION: ${POSTGRES_BACKUP_RETENTION:-7}
      MINIO_BACKUP_RETENTION: ${MINIO_BACKUP_RETENTION:-7}
      # PostgreSQL connection
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-inf_sys_db}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Please set POSTGRES_PASSWORD}
      # MinIO connection
      MINIO_HOST: minio
      MINIO_PORT: 9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-documents}
      # Remote S3 sync (offsite backup)
      REMOTE_SYNC_ENABLED: ${REMOTE_SYNC_ENABLED:-false}
      REMOTE_S3_ENDPOINT: ${REMOTE_S3_ENDPOINT:-}
      REMOTE_S3_ACCESS_KEY: ${REMOTE_S3_ACCESS_KEY:-}
      REMOTE_S3_SECRET_KEY: ${REMOTE_S3_SECRET_KEY:-}
      REMOTE_S3_BUCKET: ${REMOTE_S3_BUCKET:-}
      REMOTE_S3_REGION: ${REMOTE_S3_REGION:-us-east-1}
      REMOTE_S3_PATH: ${REMOTE_S3_PATH:-backups}
      SERVER_ID: ${SERVER_ID:-production}
      # Encryption (age or gpg)
      BACKUP_ENCRYPTION_ENABLED: ${BACKUP_ENCRYPTION_ENABLED:-false}
      BACKUP_ENCRYPTION_TYPE: ${BACKUP_ENCRYPTION_TYPE:-age}
      BACKUP_AGE_PUBLIC_KEY: ${BACKUP_AGE_PUBLIC_KEY:-}
      BACKUP_GPG_RECIPIENT: ${BACKUP_GPG_RECIPIENT:-}
      # Metrics
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      METRICS_DIR: /var/lib/node_exporter/textfile_collector
      # Notifications
      NOTIFY_ON_SUCCESS: ${NOTIFY_ON_SUCCESS:-false}
      NOTIFY_ON_FAILURE: ${NOTIFY_ON_FAILURE:-true}
      NOTIFY_LEVELS: ${NOTIFY_LEVELS:-error,warning,success}
      # Telegram notifications
      NOTIFY_TELEGRAM_ENABLED: ${NOTIFY_TELEGRAM_ENABLED:-false}
      NOTIFY_TELEGRAM_BOT_TOKEN: ${NOTIFY_TELEGRAM_BOT_TOKEN:-}
      NOTIFY_TELEGRAM_CHAT_ID: ${NOTIFY_TELEGRAM_CHAT_ID:-}
      # Webhook notifications
      NOTIFY_WEBHOOK_ENABLED: ${NOTIFY_WEBHOOK_ENABLED:-false}
      NOTIFY_WEBHOOK_URL: ${NOTIFY_WEBHOOK_URL:-}
      NOTIFY_WEBHOOK_SECRET: ${NOTIFY_WEBHOOK_SECRET:-}
      # Email notifications (SMTP)
      NOTIFY_EMAIL_ENABLED: ${NOTIFY_EMAIL_ENABLED:-false}
      NOTIFY_EMAIL_SMTP_HOST: ${NOTIFY_EMAIL_SMTP_HOST:-}
      NOTIFY_EMAIL_SMTP_PORT: ${NOTIFY_EMAIL_SMTP_PORT:-587}
      NOTIFY_EMAIL_FROM: ${NOTIFY_EMAIL_FROM:-}
      NOTIFY_EMAIL_TO: ${NOTIFY_EMAIL_TO:-}
      NOTIFY_EMAIL_USER: ${NOTIFY_EMAIL_USER:-}
      NOTIFY_EMAIL_PASSWORD: ${NOTIFY_EMAIL_PASSWORD:-}
    volumes:
      - backup_data:/backups
      - backup_metrics:/var/lib/node_exporter/textfile_collector
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    profiles:
      - backup
    restart: unless-stopped

  # n8n - Workflow Automation Platform
  # Docs: https://docs.n8n.io/
  # UI: http://localhost:5678
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "127.0.0.1:${N8N_PORT:-5678}:5678"
    environment:
      # Basic Auth (deprecated in newer versions, use N8N_BASIC_AUTH_* for older versions)
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:?Please set N8N_PASSWORD in .env}
      # Webhook URL for external triggers
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
      # Generic settings
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      GENERIC_TIMEZONE: ${TZ:-Europe/Moscow}
      TZ: ${TZ:-Europe/Moscow}
      # Database (use PostgreSQL for production)
      DB_TYPE: ${N8N_DB_TYPE:-postgresdb}
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-postgres}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?Please set POSTGRES_PASSWORD}
      # Executions settings
      EXECUTIONS_DATA_SAVE_ON_ERROR: all
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: all
      EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS: true
      # Node environment
      NODE_ENV: production
      # Disable secure cookie for local development (HTTP)
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-false}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - automation
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Uptime Kuma - Status Page & Monitoring
  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    ports:
      - "127.0.0.1:3002:3001"
    volumes:
      - uptime_kuma_data:/app/data
    environment:
      TZ: ${TZ:-Europe/Moscow}
    networks:
      - default
    profiles:
      - monitoring
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  backup_data:
    driver: local
  backup_metrics:
    driver: local
  uptime_kuma_data:
    driver: local
  n8n_data:
    driver: local