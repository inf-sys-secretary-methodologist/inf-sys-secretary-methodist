# compose.yml

services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres-dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inf_sys_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Please set POSTGRES_PASSWORD in compose.override.yml}
    # Порты НЕ пробрасываются по умолчанию для безопасности
    # Раскомментируйте в compose.override.yml если нужен доступ с хоста
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-inf_sys_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis-dev
    command: >
      sh -c '
        if [ -n "$$REDIS_PASSWORD" ]; then
          redis-server --requirepass "$$REDIS_PASSWORD"
        else
          redis-server
        fi
      '
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    # Порты НЕ пробрасываются по умолчанию для безопасности
    # Раскомментируйте в compose.override.yml если нужен доступ с хоста
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - |
          if [ -n "$$REDIS_PASSWORD" ]; then
            redis-cli -a "$$REDIS_PASSWORD" ping
          else
            redis-cli ping
          fi
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio-dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-dev
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    labels:
      - "logging=promtail"
      - "service=backend"
    environment:
      # Server
      SERVER_PORT: 8080
      SERVER_READ_TIMEOUT: ${SERVER_READ_TIMEOUT:-10s}
      SERVER_WRITE_TIMEOUT: ${SERVER_WRITE_TIMEOUT:-10s}
      SERVER_IDLE_TIMEOUT: ${SERVER_IDLE_TIMEOUT:-120s}

      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Please set POSTGRES_PASSWORD in compose.override.yml}
      DB_NAME: ${POSTGRES_DB:-inf_sys_db}
      DB_SSL_MODE: ${DB_SSL_MODE:-disable}
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-25}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-5}
      DB_CONN_MAX_LIFETIME: ${DB_CONN_MAX_LIFETIME:-5m}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_POOL_SIZE: ${REDIS_POOL_SIZE:-10}

      # Authentication (REQUIRED in production!)
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?Please set JWT_ACCESS_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Please set JWT_REFRESH_SECRET in .env}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-168h}

      # Composio Configuration (for Gmail and Telegram integration)
      COMPOSIO_API_KEY: ${COMPOSIO_API_KEY:-}
      COMPOSIO_ENTITY_ID: ${COMPOSIO_ENTITY_ID:-}
      COMPOSIO_MCP_CONFIG_ID: ${COMPOSIO_MCP_CONFIG_ID:-}

      # Telegram Bot Configuration
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}

      # CORS Configuration
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      CORS_ALLOWED_METHODS: ${CORS_ALLOWED_METHODS:-GET,POST,PUT,DELETE,OPTIONS}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS:-Content-Type,Authorization}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}

      # S3/MinIO Storage
      S3_ENDPOINT: minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-localhost:9000}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-documents}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      S3_MAX_FILE_SIZE: ${S3_MAX_FILE_SIZE:-104857600}

      # Application
      ENVIRONMENT: ${ENVIRONMENT:-development}
      VERSION: ${VERSION:-0.2.0}

      # 1C Integration Configuration
      INTEGRATION_1C_ENABLED: ${INTEGRATION_1C_ENABLED:-false}
      INTEGRATION_1C_BASE_URL: ${INTEGRATION_1C_BASE_URL:-}
      INTEGRATION_1C_USERNAME: ${INTEGRATION_1C_USERNAME:-}
      INTEGRATION_1C_PASSWORD: ${INTEGRATION_1C_PASSWORD:-}
      INTEGRATION_1C_TIMEOUT: ${INTEGRATION_1C_TIMEOUT:-30s}
      INTEGRATION_1C_MAX_RETRIES: ${INTEGRATION_1C_MAX_RETRIES:-3}
      INTEGRATION_1C_RETRY_DELAY: ${INTEGRATION_1C_RETRY_DELAY:-5s}
      INTEGRATION_1C_EMPLOYEE_CATALOG: ${INTEGRATION_1C_EMPLOYEE_CATALOG:-Catalog_Сотрудники}
      INTEGRATION_1C_STUDENT_CATALOG: ${INTEGRATION_1C_STUDENT_CATALOG:-Catalog_Студенты}
      INTEGRATION_1C_SYNC_CRON_EMPLOYEE: ${INTEGRATION_1C_SYNC_CRON_EMPLOYEE:-0 */6 * * *}
      INTEGRATION_1C_SYNC_CRON_STUDENT: ${INTEGRATION_1C_SYNC_CRON_STUDENT:-0 */6 * * *}
      INTEGRATION_1C_BATCH_SIZE: ${INTEGRATION_1C_BATCH_SIZE:-100}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend-dev
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      - backend
    # Для Linux раскомментируйте в compose.override.yml:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    container_name: backup-service
    environment:
      # Backup mode: cron, backup, restore-postgres, restore-minio, shell
      BACKUP_MODE: ${BACKUP_MODE:-cron}
      # Cron schedule (default: 2:00 AM daily)
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 2 * * *}
      # Run backup on container start
      BACKUP_ON_START: ${BACKUP_ON_START:-false}
      # Retention period in days
      POSTGRES_BACKUP_RETENTION: ${POSTGRES_BACKUP_RETENTION:-7}
      MINIO_BACKUP_RETENTION: ${MINIO_BACKUP_RETENTION:-7}
      # PostgreSQL connection
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-inf_sys_db}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Please set POSTGRES_PASSWORD}
      # MinIO connection
      MINIO_HOST: minio
      MINIO_PORT: 9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-documents}
      # Remote S3 sync (offsite backup)
      REMOTE_SYNC_ENABLED: ${REMOTE_SYNC_ENABLED:-false}
      REMOTE_S3_ENDPOINT: ${REMOTE_S3_ENDPOINT:-}
      REMOTE_S3_ACCESS_KEY: ${REMOTE_S3_ACCESS_KEY:-}
      REMOTE_S3_SECRET_KEY: ${REMOTE_S3_SECRET_KEY:-}
      REMOTE_S3_BUCKET: ${REMOTE_S3_BUCKET:-}
      REMOTE_S3_REGION: ${REMOTE_S3_REGION:-us-east-1}
      REMOTE_S3_PATH: ${REMOTE_S3_PATH:-backups}
      SERVER_ID: ${SERVER_ID:-production}
    volumes:
      - backup_data:/backups
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    profiles:
      - backup
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  backup_data:
    driver: local