name: Security & Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  GO_VERSION: '1.21'

jobs:
  # Trivy vulnerability scanner
  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy scanner in table format
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'
        severity: 'CRITICAL,HIGH,MEDIUM'
        exit-code: '0'

  # Go security checker (gosec)
  gosec:
    name: Go Security Checker
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check if Go module exists
      id: check_gomod
      run: |
        if [ -f "go.mod" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "Go module not found, skipping gosec"
        fi

    - name: Set up Go
      if: steps.check_gomod.outputs.exists == 'true'
      uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Run Gosec Security Scanner
      if: steps.check_gomod.outputs.exists == 'true'
      uses: securego/gosec@master
      with:
        args: './...'

  # Dependency review disabled - requires GitHub Advanced Security
  # dependency-review:
  #   name: Dependency Review
  #   runs-on: ubuntu-latest
  #   if: github.event_name == 'pull_request'
  #
  #   steps:
  #   - name: Checkout code
  #     uses: actions/checkout@v4
  #
  #   - name: Dependency Review
  #     uses: actions/dependency-review-action@v3
  #     with:
  #       fail-on-severity: moderate

  # Check for secrets in code
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: TruffleHog OSS
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD
        extra_args: --debug --only-verified

  # Code quality metrics
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check if Go module exists
      id: check_gomod
      run: |
        if [ -f "go.mod" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "Go module not found, skipping code quality checks"
        fi

    - name: Set up Go
      if: steps.check_gomod.outputs.exists == 'true'
      uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Install gocyclo
      if: steps.check_gomod.outputs.exists == 'true'
      run: go install github.com/fzipp/gocyclo/cmd/gocyclo@latest

    - name: Check cyclomatic complexity
      if: steps.check_gomod.outputs.exists == 'true'
      run: |
        echo "Checking cyclomatic complexity..."
        # Find functions with complexity > 15
        gocyclo -over 15 . || echo "Warning: High complexity detected"

    - name: Install gocognit
      if: steps.check_gomod.outputs.exists == 'true'
      run: go install github.com/uudashr/gocognit/cmd/gocognit@latest

    - name: Check cognitive complexity
      if: steps.check_gomod.outputs.exists == 'true'
      run: |
        echo "Checking cognitive complexity..."
        gocognit -over 15 . || echo "Warning: High cognitive complexity detected"

  # License compliance
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check if Go module exists
      id: check_gomod
      run: |
        if [ -f "go.mod" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "Go module not found, skipping license check"
        fi

    - name: Set up Go
      if: steps.check_gomod.outputs.exists == 'true'
      uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Download dependencies
      if: steps.check_gomod.outputs.exists == 'true'
      run: go mod download

    - name: Install go-licenses
      if: steps.check_gomod.outputs.exists == 'true'
      run: go install github.com/google/go-licenses@latest

    - name: Check licenses
      if: steps.check_gomod.outputs.exists == 'true'
      run: |
        go-licenses check ./... --disallowed_types=forbidden,restricted || echo "License check completed with warnings"

