name: Frontend CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  push:
    branches: [main]
    paths:
      - 'frontend/**'

# Minimal GITHUB_TOKEN scope: jobs only checkout + build + run lint/tests/
# audit + upload artifacts (workflow-scoped, no extra token perm needed) +
# codecov upload (CODECOV_TOKEN secret). Closes CodeQL
# actions/missing-workflow-permissions.
permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run type-check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        if: always()
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    name: E2E Shard
    runs-on: ubuntu-latest
    # Sharded across parallel runners. The suite leans heavily on
    # waitForLoadState('networkidle'), which flakes under in-runner CPU
    # contention (workers>1) — so each runner keeps workers=1 (see
    # playwright.config.ts) and we parallelise across jobs instead. To change
    # the degree of parallelism, edit the matrix list below; the --shard total
    # tracks it automatically via strategy.job-total.
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    # Run inside the official Playwright image: Chromium + its system deps are
    # baked in, eliminating the ~167 MB per-run browser download that caused
    # the chronic E2E slowness/hangs. Tag MUST track the @playwright/test
    # version in frontend/package-lock.json (bump both together).
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Ensure Playwright browser present
        # No-op when the image tag matches the locked Playwright version
        # (browser already baked in); only fetches the binary on a version
        # mismatch. System deps come from the image, so no --with-deps.
        run: npx playwright install chromium

      - name: Run E2E tests (shard ${{ matrix.shard }}/${{ strategy.job-total }})
        run: npx playwright test --shard=${{ matrix.shard }}/${{ strategy.job-total }}

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-${{ matrix.shard }}
          path: frontend/playwright-report/
          retention-days: 7

  # Aggregate gate: keeps a single "E2E Tests" status check regardless of how
  # many shards run, so branch-protection required checks stay stable. Green
  # only when every shard succeeded.
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [e2e]
    if: always()
    steps:
      - name: Verify all E2E shards passed
        run: |
          if [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "E2E shards result: ${{ needs.e2e.result }}"
            exit 1
          fi
          echo "All E2E shards passed"

  build:
    name: Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Next.js build
        uses: actions/cache@v6
        with:
          path: |
            ~/.npm
            ${{ github.workspace }}/frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/**/*.js', 'frontend/**/*.jsx', 'frontend/**/*.ts', 'frontend/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: next-build
          path: frontend/.next
          retention-days: 1
