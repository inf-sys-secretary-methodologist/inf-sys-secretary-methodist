name: Backup Verification

on:
  push:
    branches: [main]
    paths:
      - 'backup/**'
      - '.github/workflows/backup-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backup/**'
      - '.github/workflows/backup-test.yml'
  schedule:
    # Run weekly on Sunday at 3:00 AM UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  backup-restore-test:
    name: Backup & Restore Verification
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: inf_sys_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres-restore:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: inf_sys_db_restore
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Start MinIO
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data
          # Wait for MinIO to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live; then
              echo "MinIO is ready"
              break
            fi
            sleep 1
          done

      - name: Install dependencies
        run: |
          # Install MinIO client
          curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
          chmod +x /usr/local/bin/mc

          # Install age encryption
          curl -sSL https://github.com/FiloSottile/age/releases/download/v1.2.0/age-v1.2.0-linux-amd64.tar.gz | tar -xz -C /tmp
          sudo mv /tmp/age/age /usr/local/bin/age
          sudo mv /tmp/age/age-keygen /usr/local/bin/age-keygen
          chmod +x /usr/local/bin/age /usr/local/bin/age-keygen

          # Install PostgreSQL 17 client (runner has v16, but service runs v17)
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update && sudo apt-get install -y jq postgresql-client-17

      - name: Setup test data in PostgreSQL
        run: |
          # Create test tables and data
          PGPASSWORD=testpassword psql -h localhost -U postgres -d inf_sys_db << 'EOF'
          CREATE TABLE IF NOT EXISTS test_users (
              id SERIAL PRIMARY KEY,
              name VARCHAR(255) NOT NULL,
              email VARCHAR(255) UNIQUE NOT NULL,
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );

          CREATE TABLE IF NOT EXISTS test_documents (
              id SERIAL PRIMARY KEY,
              title VARCHAR(255) NOT NULL,
              content TEXT,
              user_id INTEGER REFERENCES test_users(id),
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );

          -- Insert test data
          INSERT INTO test_users (name, email) VALUES
              ('Test User 1', 'user1@example.com'),
              ('Test User 2', 'user2@example.com'),
              ('Test User 3', 'user3@example.com');

          INSERT INTO test_documents (title, content, user_id) VALUES
              ('Document 1', 'This is test content for document 1', 1),
              ('Document 2', 'This is test content for document 2', 2),
              ('Document 3', 'This is test content for document 3', 3);

          -- Create a view for verification
          CREATE VIEW test_summary AS
          SELECT
              (SELECT COUNT(*) FROM test_users) as user_count,
              (SELECT COUNT(*) FROM test_documents) as document_count;
          EOF

          echo "Test data created successfully"

      - name: Setup test data in MinIO
        run: |
          # Configure MinIO client
          mc alias set local http://localhost:9000 minioadmin minioadmin

          # Create test bucket
          mc mb local/documents || true

          # Create test files
          echo "Test file content 1" > /tmp/test1.txt
          echo "Test file content 2" > /tmp/test2.txt
          echo '{"key": "value", "test": true}' > /tmp/test.json

          # Upload files
          mc cp /tmp/test1.txt local/documents/
          mc cp /tmp/test2.txt local/documents/
          mc cp /tmp/test.json local/documents/

          echo "MinIO test data created successfully"

      - name: Generate encryption keys
        run: |
          # Generate age key pair for testing
          age-keygen -o /tmp/age-key.txt 2>/dev/null
          AGE_PUBLIC_KEY=$(grep "public key:" /tmp/age-key.txt | cut -d: -f2 | tr -d ' ')
          echo "AGE_PUBLIC_KEY=${AGE_PUBLIC_KEY}" >> $GITHUB_ENV
          echo "AGE_PRIVATE_KEY_FILE=/tmp/age-key.txt" >> $GITHUB_ENV

      - name: Run PostgreSQL backup (unencrypted)
        run: |
          mkdir -p /tmp/backups/postgres
          export DB_HOST=localhost
          export DB_PORT=5432
          export DB_NAME=inf_sys_db
          export DB_USER=postgres
          export DB_PASSWORD=testpassword
          export POSTGRES_BACKUP_RETENTION=7
          export BACKUP_ENCRYPTION_ENABLED=false
          export METRICS_ENABLED=false
          export NOTIFY_ON_FAILURE=false

          chmod +x backup/scripts/*.sh
          backup/scripts/backup-postgres.sh /tmp/backups/postgres

          echo "Backup files:"
          ls -la /tmp/backups/postgres/

      - name: Run PostgreSQL backup (encrypted with age)
        run: |
          mkdir -p /tmp/backups/postgres-encrypted
          export DB_HOST=localhost
          export DB_PORT=5432
          export DB_NAME=inf_sys_db
          export DB_USER=postgres
          export DB_PASSWORD=testpassword
          export POSTGRES_BACKUP_RETENTION=7
          export BACKUP_ENCRYPTION_ENABLED=true
          export BACKUP_ENCRYPTION_TYPE=age
          export BACKUP_AGE_PUBLIC_KEY="${AGE_PUBLIC_KEY}"
          export METRICS_ENABLED=false
          export NOTIFY_ON_FAILURE=false

          backup/scripts/backup-postgres.sh /tmp/backups/postgres-encrypted

          echo "Encrypted backup files:"
          ls -la /tmp/backups/postgres-encrypted/

      - name: Run MinIO backup
        run: |
          mkdir -p /tmp/backups/minio
          export MINIO_HOST=localhost
          export MINIO_PORT=9000
          export MINIO_ROOT_USER=minioadmin
          export MINIO_ROOT_PASSWORD=minioadmin
          export S3_BUCKET_NAME=documents
          export MINIO_BACKUP_RETENTION=7
          export BACKUP_ENCRYPTION_ENABLED=false
          export METRICS_ENABLED=false
          export NOTIFY_ON_FAILURE=false

          backup/scripts/backup-minio.sh /tmp/backups/minio

          echo "MinIO backup files:"
          ls -la /tmp/backups/minio/

      - name: Restore PostgreSQL backup
        run: |
          # Find the latest unencrypted backup
          BACKUP_FILE=$(ls -t /tmp/backups/postgres/postgres_*.sql.gz | head -1)
          echo "Restoring from: ${BACKUP_FILE}"

          # Restore to the second PostgreSQL instance
          gunzip -c "${BACKUP_FILE}" | PGPASSWORD=testpassword psql -h localhost -p 5433 -U postgres -d inf_sys_db_restore

          echo "Backup restored successfully"

      - name: Verify restored data
        run: |
          echo "Verifying restored data..."

          # Get counts from original database
          ORIGINAL_USERS=$(PGPASSWORD=testpassword psql -h localhost -p 5432 -U postgres -d inf_sys_db -t -c "SELECT COUNT(*) FROM test_users")
          ORIGINAL_DOCS=$(PGPASSWORD=testpassword psql -h localhost -p 5432 -U postgres -d inf_sys_db -t -c "SELECT COUNT(*) FROM test_documents")

          # Get counts from restored database
          RESTORED_USERS=$(PGPASSWORD=testpassword psql -h localhost -p 5433 -U postgres -d inf_sys_db_restore -t -c "SELECT COUNT(*) FROM test_users")
          RESTORED_DOCS=$(PGPASSWORD=testpassword psql -h localhost -p 5433 -U postgres -d inf_sys_db_restore -t -c "SELECT COUNT(*) FROM test_documents")

          echo "Original: ${ORIGINAL_USERS} users, ${ORIGINAL_DOCS} documents"
          echo "Restored: ${RESTORED_USERS} users, ${RESTORED_DOCS} documents"

          # Verify counts match
          if [ "${ORIGINAL_USERS}" != "${RESTORED_USERS}" ]; then
            echo "ERROR: User count mismatch!"
            exit 1
          fi

          if [ "${ORIGINAL_DOCS}" != "${RESTORED_DOCS}" ]; then
            echo "ERROR: Document count mismatch!"
            exit 1
          fi

          # Verify specific data
          ORIGINAL_EMAIL=$(PGPASSWORD=testpassword psql -h localhost -p 5432 -U postgres -d inf_sys_db -t -c "SELECT email FROM test_users WHERE id = 1" | tr -d ' ')
          RESTORED_EMAIL=$(PGPASSWORD=testpassword psql -h localhost -p 5433 -U postgres -d inf_sys_db_restore -t -c "SELECT email FROM test_users WHERE id = 1" | tr -d ' ')

          if [ "${ORIGINAL_EMAIL}" != "${RESTORED_EMAIL}" ]; then
            echo "ERROR: Data mismatch for user 1 email!"
            exit 1
          fi

          echo "✅ All verification checks passed!"

      - name: Verify encrypted backup can be decrypted
        run: |
          ENCRYPTED_BACKUP=$(ls -t /tmp/backups/postgres-encrypted/postgres_*.sql.gz.age | head -1)
          echo "Testing decryption of: ${ENCRYPTED_BACKUP}"

          # Decrypt the backup
          age -d -i "${AGE_PRIVATE_KEY_FILE}" -o /tmp/decrypted-backup.sql.gz "${ENCRYPTED_BACKUP}"

          # Verify it's a valid gzip file
          if gunzip -t /tmp/decrypted-backup.sql.gz; then
            echo "✅ Encrypted backup decryption verified!"
          else
            echo "ERROR: Decrypted file is not a valid gzip!"
            exit 1
          fi

      - name: Verify MinIO backup
        run: |
          mkdir -p /tmp/restore-minio
          BACKUP_FILE=$(ls -t /tmp/backups/minio/minio_*.tar.gz | head -1)
          echo "Extracting MinIO backup: ${BACKUP_FILE}"

          tar -xzf "${BACKUP_FILE}" -C /tmp/restore-minio

          # Verify files exist
          if [ -f "/tmp/restore-minio/"*/documents/test1.txt ]; then
            echo "✅ MinIO backup verification passed!"
          else
            echo "ERROR: MinIO backup files not found!"
            ls -laR /tmp/restore-minio/
            exit 1
          fi

      - name: Test metrics script
        run: |
          mkdir -p /tmp/metrics
          export METRICS_DIR=/tmp/metrics
          export SERVER_ID=test-server

          chmod +x backup/scripts/metrics.sh

          # Record a test backup
          backup/scripts/metrics.sh record_backup postgres success 120 1048576
          backup/scripts/metrics.sh record_backup minio success 60 2097152
          backup/scripts/metrics.sh record_sync success 30

          # Verify metrics file was created
          if [ -f "/tmp/metrics/backup_metrics.prom" ]; then
            echo "Metrics file content:"
            cat /tmp/metrics/backup_metrics.prom
            echo ""
            echo "✅ Metrics test passed!"
          else
            echo "ERROR: Metrics file not created!"
            exit 1
          fi

      - name: Summary
        run: |
          echo "========================================"
          echo "Backup Verification Summary"
          echo "========================================"
          echo "✅ PostgreSQL backup: PASSED"
          echo "✅ PostgreSQL encrypted backup: PASSED"
          echo "✅ PostgreSQL restore: PASSED"
          echo "✅ Data integrity verification: PASSED"
          echo "✅ MinIO backup: PASSED"
          echo "✅ MinIO backup verification: PASSED"
          echo "✅ Metrics recording: PASSED"
          echo "========================================"

  docker-build-test:
    name: Docker Build Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backup image
        uses: docker/build-push-action@v6
        with:
          context: ./backup
          load: true
          push: false
          tags: backup-service:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test backup image
        run: |
          # Run the container and verify tools are installed
          # Override entrypoint since default starts cron daemon
          docker run --rm --entrypoint which backup-service:test age
          docker run --rm --entrypoint which backup-service:test gpg
          docker run --rm --entrypoint which backup-service:test mc
          docker run --rm --entrypoint which backup-service:test pg_dump
          docker run --rm --entrypoint which backup-service:test jq
          echo "✅ All required tools are installed in the backup image"
