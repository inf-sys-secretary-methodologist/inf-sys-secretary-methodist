name: CI/CD Pipeline

# Single-developer monolith — этот workflow реально содержит:
#   1. security-scan (Trivy CRITICAL+HIGH filesystem scan)
#   2. frontend-image-build (Docker build verification — no push)
#
# Backend Go tests live в Backend CI workflow (backend-ci.yml).
# Frontend lint / type / unit / E2E tests live в Frontend CI workflow
# (frontend-ci.yml). Database migration tests — Database CI. Security
# tooling extended scope — Security & Quality. Documentation parity —
# Documentation CI.
#
# Cleanup history (v0.128.5):
# - Dropped phantom microservices matrix (10 entries: services/auth,
#   services/user, ..., services/integration) — directories never
#   existed; project shipped as monolith. Each matrix entry was a no-op
#   (skipped via `[ -d services/X ]` check), wasting CI minutes + 10
#   useless badge entries per push.
# - Dropped frontend-test job — fully duplicates Frontend CI (lint,
#   type-check, unit tests + E2E через Playwright).
# - Dropped deploy-staging / deploy-production stub jobs — pure `echo`
#   placeholders, no actual deployment logic; develop branch не used,
#   production deploy mechanism лежит outside GitHub Actions для
#   single-developer diploma project.
# - Removed `push: true` from frontend Docker build — org-level GitHub
#   App permission "Create organization package" not granted (chronic
#   `denied: installation not allowed to Create organization package`
#   error from build-and-push job historically). Image build serves as
#   verification (Dockerfile compiles, layers resolve); publish disabled
#   until org admin enables Actions to write GHCR packages.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci.yml'
      - 'docker-compose.yml'
      - 'Dockerfile*'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci.yml'
      - 'docker-compose.yml'
      - 'Dockerfile*'

jobs:
  # Filesystem vulnerability scan — Trivy CRITICAL+HIGH severity.
  # Wider package vulnerability tracking (45 dependabot vulns) lives in
  # Security & Quality workflow. This job catches new high-severity
  # introductions before merge.
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0' # report-only; security-quality workflow gates fail

  # Docker image build verification — confirms frontend Dockerfile
  # compiles, dependencies resolve, multi-stage layers produce a usable
  # artifact. NO push to GHCR (see top-of-file note); image discarded
  # после build. Re-enable push when org admin grants packages-write +
  # "Create organization package" installation permission.
  frontend-image-build:
    runs-on: ubuntu-latest
    needs: [security-scan]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build frontend image (verification only — no push)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: true
          tags: inf-sys-frontend:ci-verify
          cache-from: type=gha
          cache-to: type=gha,mode=max
