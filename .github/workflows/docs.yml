name: Documentation CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'backend-README.md'
      - '.env.example'
      - 'internal/shared/infrastructure/config/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'backend-README.md'
      - '.env.example'
      - 'internal/shared/infrastructure/config/**'

jobs:
  # Validate Markdown files
  markdown-lint:
    runs-on: ubuntu-latest
    name: Lint Markdown Files

    steps:
    - uses: actions/checkout@v4

    - name: Lint Markdown files
      uses: DavidAnson/markdownlint-cli2-action@v13
      with:
        config: '.markdownlint.json'
        globs: |
          docs/**/*.md
          README.md
          backend-README.md

  # Check for broken links
  link-checker:
    runs-on: ubuntu-latest
    name: Check Documentation Links

    steps:
    - uses: actions/checkout@v4

    - name: Install markdown-link-check
      run: npm install -g markdown-link-check

    - name: Check links in documentation files
      run: |
        find docs -name "*.md" -exec markdown-link-check {} --config .github/markdown-link-config.json \;

    - name: Check links in README
      run: markdown-link-check README.md --config .github/markdown-link-config.json

  # Validate documentation structure
  structure-check:
    runs-on: ubuntu-latest
    name: Validate Documentation Structure

    steps:
    - uses: actions/checkout@v4

    - name: Check required documentation files
      run: |
        echo "📋 Checking documentation structure..."

        # Required directories
        required_dirs=(
          "docs/api"
          "docs/architecture"
          "docs/deployment"
          "docs/development"
          "docs/security"
          "docs/users"
          "docs/workflows"
        )

        # Required files
        required_files=(
          "docs/README.md"
          "docs/project-overview.md"
          "docs/api/api-documentation.md"
          "docs/architecture/modular-architecture.md"
          "docs/development/development-guide.md"
          "docs/deployment/docker-setup.md"
          "README.md"
        )

        missing_items=()

        # Check directories
        for dir in "${required_dirs[@]}"; do
          if [[ ! -d "$dir" ]]; then
            missing_items+=("Directory: $dir")
          fi
        done

        # Check files
        for file in "${required_files[@]}"; do
          if [[ ! -f "$file" ]]; then
            missing_items+=("File: $file")
          fi
        done

        if [[ ${#missing_items[@]} -gt 0 ]]; then
          echo "❌ Missing required documentation:"
          printf '%s\n' "${missing_items[@]}"
          exit 1
        else
          echo "✅ All required documentation is present"
        fi

  # Spell check (optional)
  spell-check:
    runs-on: ubuntu-latest
    name: Spell Check Documentation

    steps:
    - uses: actions/checkout@v4

    - name: Install cspell
      run: npm install -g cspell

    - name: Spell check documentation
      run: |
        echo "Running spell check on documentation files..."
        # Use basic spell check - will create simple config if needed
        find docs -name "*.md" -exec echo "Checking {}" \; -exec cspell {} --no-progress --show-context \; || true
        echo "Spell check completed (non-blocking)"

  # Verify .env.example sync with config.go
  env-config-sync:
    runs-on: ubuntu-latest
    name: Verify .env.example and config.go Sync

    steps:
    - uses: actions/checkout@v4

    - name: Check .env.example variables match config.go
      run: |
        echo "🔍 Checking .env.example and config.go synchronization..."

        # Extract env variables from .env.example (excluding comments and empty lines)
        env_vars=$(grep -v '^#' .env.example | grep -v '^$' | cut -d= -f1 | sort)

        # Extract getEnv calls from config.go
        config_vars=$(grep -oP 'getEnv\w*\("\K[^"]+' internal/shared/infrastructure/config/config.go | sort | uniq)

        echo "Variables in .env.example:"
        echo "$env_vars"
        echo ""
        echo "Variables referenced in config.go:"
        echo "$config_vars"
        echo ""

        # Check if all config.go variables are in .env.example
        missing=()
        for var in $config_vars; do
          if ! echo "$env_vars" | grep -q "^${var}$"; then
            missing+=("$var")
          fi
        done

        if [ ${#missing[@]} -gt 0 ]; then
          echo "❌ The following variables are in config.go but missing from .env.example:"
          printf '%s\n' "${missing[@]}"
          exit 1
        else
          echo "✅ All config.go variables are present in .env.example"
        fi