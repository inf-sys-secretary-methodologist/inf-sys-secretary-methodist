version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck      # Проверка обработки ошибок
    - govet         # Проверка подозрительных конструкций
    - ineffassign   # Неиспользуемые присваивания
    - staticcheck   # Множество статических проверок
    - unused        # Неиспользуемый код
    - misspell      # Опечатки в комментариях
    - revive        # Замена golint
    - gosec         # Security issues
    - bodyclose     # HTTP body close
    - errorlint     # Error wrapping
    - goconst       # Повторяющиеся строки/числа
    - gocritic      # Множество проверок
    - gocyclo       # Цикломатическая сложность
    - nestif        # Вложенность if
    - predeclared   # Использование предопределенных идентификаторов
    - unconvert     # Лишние конвертации типов
    - whitespace    # Лишние пробелы

  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false

    govet:
      enable:
        - atomic
        - bools
        - buildtag
        - nilfunc
        - printf

    gocyclo:
      min-complexity: 70

    goconst:
      min-len: 3
      # Default 3 produced noise on natural log/json/gin keys
      # ("error", "name", "status", "email") in v2.12+. After errorKey
      # extracts in 9 handler packages, unauthorizedMsg in notifications,
      # and AgentMethodist/AgentAcademicSecretary in agentsim, threshold
      # at 25 leaves only mid-range log-field-name duplication
      # ("document_id" / "user_id" / "name" / "month") in document/dashboard
      # usecases as backlog — extracting those is a multi-file refactor
      # outside lint-cleanup scope. Test fixtures excluded entirely below.
      min-occurrences: 25

    mnd:
      ignored-functions:
        - 'time.Second'
        - 'time.Minute'
        - 'time.Hour'

    misspell:
      locale: US

    revive:
      rules:
        - name: exported
          severity: warning
          disabled: false
        - name: indent-error-flow
          severity: warning
        - name: var-naming
          severity: warning

    gosec:
      excludes:
        - G104  # Errors unhandled (covered by errcheck)

    nestif:
      min-complexity: 40

  exclusions:
    rules:
      # Exclude some linters from running on test files
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
          - gosec
          - mnd
          # Test fixtures naturally repeat literals (e.g. "email", "Test",
          # "Hello world"); extracting each one into a const inflates the
          # test files without any maintainability win. Production code
          # stays under goconst's eye.
          - goconst

      # Exclude shadowing check for err variable
      - text: 'shadow: declaration of "err"'
        linters:
          - govet

formatters:
  enable:
    - gofmt         # Форматирование кода
    - goimports     # Сортировка импортов

  settings:
    gofmt:
      simplify: true

    goimports:
      local-prefixes:
        - github.com/inf-sys-secretary-methodologist/inf-sys-secretary-methodist
